<!DOCTYPE html>
<html>
<head>
<title>Abuzar Battery Service</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial;
background:#f4f7fb;
}

/* HEADER */
.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
background:white;
}

.logo{
font-size:22px;
font-weight:bold;
color:#0b3d91;
}

.btn{
background:#0b3d91;
color:white;
padding:8px 15px;
border:none;
cursor:pointer;
}

/* SLIDER */
.brand-slider{
overflow:hidden;
background:white;
padding:15px;
}

.track{
display:flex;
animation:scroll 15s linear infinite;
}

.slide{
min-width:150px;
text-align:center;
font-weight:bold;
color:#0b3d91;
}

@keyframes scroll{
0%{transform:translateX(0);}
100%{transform:translateX(-50%);}
}

/* CATEGORIES */
.categories{
display:flex;
justify-content:space-around;
padding:20px;
flex-wrap:wrap;
}

.cat{
background:white;
padding:15px;
width:120px;
text-align:center;
border-radius:10px;
box-shadow:0 0 10px #ddd;
margin:10px;
}

/* PRODUCTS */
.products{
padding:20px;
}

.grid{
display:flex;
flex-wrap:wrap;
justify-content:center;
}

.card{
background:white;
width:200px;
margin:10px;
padding:10px;
text-align:center;
border-radius:10px;
box-shadow:0 0 10px #ddd;
}

.card img{
width:100%;
}

/* WHATSAPP */
.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
padding:15px;
border-radius:50%;
text-decoration:none;
}
</style>
</head>

<body>

<div class="header">
<div class="logo">ABUZAR BATTERY 🔋</div>
<button class="btn" onclick="showCart()">🛒 Cart</button>
</div>

<!-- BRAND SLIDER -->
<div class="brand-slider">
<div class="track">
<div class="slide">OSAKA</div>
<div class="slide">PHOENIX</div>
<div class="slide">AGS</div>
<div class="slide">EXIDE</div>
<div class="slide">VOLTA</div>
<div class="slide">DAEWOO</div>
</div>
</div>

<!-- CATEGORIES -->
<div class="categories">
<div class="cat"><img src="https://via.placeholder.com/80"><p>Car</p></div>
<div class="cat"><img src="https://via.placeholder.com/80"><p>UPS</p></div>
<div class="cat"><img src="https://via.placeholder.com/80"><p>Solar</p></div>
<div class="cat"><img src="https://via.placeholder.com/80"><p>Dry</p></div>
</div>

<!-- PRODUCTS -->
<div class="products">
<h2 style="text-align:center;">Products</h2>

<div class="grid">

<div class="card" data-brand="ags">
<img src="https://via.placeholder.com/150">
<h3>AGS GR-65</h3>
<button class="btn" onclick="addToCart('AGS GR-65')">Add to Cart</button>
</div>

<div class="card" data-brand="osaka">
<img src="https://via.placeholder.com/150">
<h3>Osaka NS60</h3>
<button class="btn" onclick="addToCart('Osaka NS60')">Add to Cart</button>
</div>

<div class="card" data-brand="phoenix">
<img src="https://via.placeholder.com/150">
<h3>Phoenix XP-70</h3>
<button class="btn" onclick="addToCart('Phoenix XP-70')">Add to Cart</button>
</div>

<div class="card" data-brand="osaka">
<img src="https://via.placeholder.com/150">
<h3>Osaka TA-1800</h3>
<button class="btn" onclick="addToCart('Osaka TA-1800')">Add to Cart</button>
</div>

</div>
</div>

<a class="whatsapp" href="#" onclick="sendCartWhatsApp()">💬</a>

<script>
let cart = [];

function addToCart(product){
cart.push(product);
alert(product + " added 🛒");
}

function showCart(){
if(cart.length===0){
alert("Cart empty");
}else{
alert(cart.join("\n"));
}
}

function sendCartWhatsApp(){
if(cart.length===0){
alert("Cart empty");
return;
}
let msg="Assalamualaikum, mujhe ye batteries chahiye:\n\n"+cart.join("\n");
window.open("https://wa.me/923014681059?text="+encodeURIComponent(msg));
}
</script>

</body>
</html>
