<!DOCTYPE html>
<html>
<head>
<title>Abuzar Battery Service</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{margin:0;font-family:Arial;background:#f4f7fb;}

/* TOP */
.topbar{background:#0b3d91;color:white;padding:8px;text-align:center;}

/* HEADER */
.header{display:flex;justify-content:space-between;align-items:center;padding:15px;background:white;}
.logo{font-size:22px;font-weight:bold;color:#0b3d91;}

/* BUTTON */
.btn{background:#0b3d91;color:white;padding:8px 15px;border:none;border-radius:20px;cursor:pointer;}

/* LAYOUT */
.main{display:flex;}
.sidebar{
width:200px;background:white;padding:15px;
box-shadow:0 0 10px #ddd;
}
.sidebar p{cursor:pointer;margin:8px 0;}

.content{flex:1;padding:10px;}

/* HERO */
.hero{
background:linear-gradient(135deg,#0b3d91,#1456d1);
color:white;padding:25px;border-radius:10px;
}

/* SLIDER */
.slider{overflow:hidden;background:white;margin-top:10px;}
.track{display:flex;gap:50px;animation:scroll 15s linear infinite;}
@keyframes scroll{
0%{transform:translateX(100%);}
100%{transform:translateX(-100%);}
}

/* GRID */
.grid{display:flex;flex-wrap:wrap;justify-content:center;}
.card{
background:white;width:200px;margin:10px;padding:10px;
text-align:center;border-radius:10px;
box-shadow:0 0 10px #ddd;
}
.card img{width:100%;}

/* DETAIL */
.detail{display:none;padding:20px;}
.detail img{width:250px;}

/* WHATSAPP */
.whatsapp{
position:fixed;bottom:20px;right:20px;
background:#25D366;color:white;padding:15px;border-radius:50%;
}
</style>
</head>

<body>

<div class="topbar">📍 Lahore | 📞 03014681059</div>

<div class="header">
<div class="logo">ABUZAR BATTERY 🔋</div>
<button class="btn" onclick="showCart()">Cart 🛒</button>
</div>

<div class="main">

<!-- SIDEBAR -->
<div class="sidebar">
<h3>Top Brands</h3>
<p onclick="showBrand('osaka')">Osaka</p>
<p onclick="showBrand('ags')">AGS</p>
<p onclick="showBrand('phoenix')">Phoenix</p>
<p onclick="showBrand('exide')">Exide</p>
<p onclick="showBrand('volta')">Volta</p>
<p onclick="showBrand('daewoo')">Daewoo</p>
<p onclick="showBrand('unique')">Unique</p>

<button class="btn" onclick="goHome()">View All</button>
</div>

<!-- CONTENT -->
<div class="content">

<!-- HERO -->
<div class="hero">
<h2>Need Help Choosing Battery? 🔋</h2>
<p>Contact us for best recommendation</p>
<button class="btn" onclick="orderNow('Help')">Get Help</button>
</div>

<!-- SLIDER -->
<div class="slider">
<div class="track">
<div>OSAKA</div><div>AGS</div><div>PHOENIX</div>
<div>EXIDE</div><div>VOLTA</div><div>DAEWOO</div>
<div>UNIQUE</div>
</div>
</div>

<!-- PRODUCTS -->
<div id="products">
<h2>Products</h2>
<div class="grid" id="list"></div>
</div>

<!-- DETAIL -->
<div id="detail" class="detail">
<button class="btn" onclick="back()">⬅ Back</button>
<h2 id="name"></h2>
<img id="img">
<br>
<button onclick="dec()">-</button>
<span id="qty">1</span>
<button onclick="inc()">+</button>
<br><br>
<button class="btn" onclick="addCart()">Add to Cart</button>
<button class="btn" onclick="buy()">Buy Now</button>
</div>

</div>
</div>

<a class="whatsapp" onclick="sendCart()">💬</a>

<script>
let data={
osaka:["NS60","TA-1800"],
ags:["GR-65","SP-180"],
phoenix:["XP-70"],
exide:["N55"],
volta:["T-125"],
daewoo:["DL-60"],
unique:["UT-100"]
};

let cart=[];
let current="";
let q=1;

function showBrand(b){
let list=document.getElementById("list");
list.innerHTML="";
data[b].forEach(x=>{
list.innerHTML+=`<div class="card" onclick="openDetail('${b} ${x}')">
<img src="https://via.placeholder.com/200">
<h3>${b.toUpperCase()} ${x}</h3>
</div>`;
});
}

function openDetail(p){
current=p;
q=1;
document.getElementById("products").style.display="none";
document.getElementById("detail").style.display="block";
document.getElementById("name").innerText=p;
document.getElementById("img").src="https://via.placeholder.com/300";
document.getElementById("qty").innerText=q;
}

function back(){
document.getElementById("products").style.display="block";
document.getElementById("detail").style.display="none";
}

function inc(){q++;qty.innerText=q;}
function dec(){if(q>1)q--;qty.innerText=q;}

function addCart(){for(let i=0;i<q;i++)cart.push(current);alert("Added");}
function buy(){window.open("https://wa.me/923014681059?text="+current+" x"+q);}
function sendCart(){window.open("https://wa.me/923014681059?text="+cart.join("\n"));}

function showCart(){alert(cart.length?cart.join("\n"):"Empty");}
function goHome(){location.reload();}

function orderNow(msg){
window.open("https://wa.me/923014681059?text="+msg);
}
</script>

</body>
</html>
