<!DOCTYPE html>
<html>
<head>
<title>Abuzar Battery Service</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{margin:0;font-family:Arial;background:#f5f7fb;}
.topbar{background:#0b3d91;color:white;padding:8px;text-align:center;}

.header{
display:flex;justify-content:space-between;align-items:center;
padding:15px;background:white;box-shadow:0 2px 10px #ddd;
}

.logo{font-size:22px;font-weight:bold;color:#0b3d91;}
.btn{background:#0b3d91;color:white;padding:10px 15px;border:none;border-radius:20px;cursor:pointer;}

.main{display:flex;gap:20px;padding:20px;}
.left{flex:3;}
.right{flex:1;background:white;padding:15px;border-radius:10px;box-shadow:0 0 10px #ddd;}

.hero{
display:flex;justify-content:space-between;align-items:center;
background:linear-gradient(135deg,#0b3d91,#1456d1);
color:white;padding:30px;border-radius:15px;margin-bottom:20px;
}

.hero img{width:220px;}

.categories{display:flex;margin:20px 0;}
.cat{
flex:1;background:white;margin:5px;padding:15px;text-align:center;
border-radius:10px;box-shadow:0 0 10px #ddd;cursor:pointer;
}

.brands{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;}
.brand{
background:white;padding:15px;text-align:center;border-radius:10px;
box-shadow:0 0 10px #ddd;cursor:pointer;
}

.slider{overflow:hidden;background:white;padding:10px;margin:10px 0;border-radius:10px;}
.track{display:flex;gap:40px;animation:scroll 15s linear infinite;}
@keyframes scroll{
0%{transform:translateX(100%);}
100%{transform:translateX(-100%);}
}

/* PRODUCTS */
.products{display:none;}
.grid{display:flex;flex-wrap:wrap;justify-content:center;}
.card{
background:white;width:200px;margin:10px;padding:10px;
text-align:center;border-radius:10px;box-shadow:0 0 10px #ddd;
}

/* DETAIL PAGE */
.detail{
display:none;
background:white;padding:20px;border-radius:10px;
box-shadow:0 0 10px #ddd;
}
.detail-box{
display:flex;gap:20px;align-items:center;
}
.detail img{width:250px;}
.qty{
display:flex;align-items:center;margin:10px 0;
}
.qty button{
width:30px;height:30px;border:none;background:#0b3d91;color:white;
}
.qty span{margin:0 10px;font-size:18px;}

.whatsapp{
position:fixed;bottom:20px;right:20px;
background:#25D366;color:white;padding:15px;border-radius:50%;
cursor:pointer;
}
</style>
</head>

<body>

<div class="topbar">
📍 Gulshan-e-Ravi Lahore | 📞 03014681059
</div>

<div class="header">
<div class="logo">ABUZAR BATTERY 🔋</div>
<button class="btn" onclick="goHome()">Home</button>
</div>

<div class="main">

<div class="left">

<!-- HERO -->
<div class="hero">
<div>
<h2>Power That Never Stops 🔋</h2>
<p>Best Batteries in Lahore</p>
</div>
<img src="https://via.placeholder.com/200">
</div>

<!-- SLIDER -->
<div class="slider">
<div class="track">
<div>OSAKA</div>
<div>AGS</div>
<div>PHOENIX</div>
<div>EXIDE</div>
<div>VOLTA</div>
<div>UNIQUE</div>
</div>
</div>

<!-- BRANDS -->
<div id="brands" class="brands">
<div class="brand" onclick="showBrand('osaka')">OSAKA</div>
<div class="brand" onclick="showBrand('ags')">AGS</div>
<div class="brand" onclick="showBrand('phoenix')">PHOENIX</div>
<div class="brand" onclick="showBrand('exide')">EXIDE</div>
<div class="brand" onclick="showBrand('volta')">VOLTA</div>
<div class="brand" onclick="showBrand('unique')">UNIQUE</div>
</div>

<!-- PRODUCTS -->
<div id="products" class="products">
<button class="btn" onclick="goHome()">⬅ Back</button>
<div class="grid" id="productList"></div>
</div>

<!-- DETAIL PAGE -->
<div id="detail" class="detail">
<button class="btn" onclick="backToProducts()">⬅ Back</button>

<div class="detail-box">
<img src="https://via.placeholder.com/250">
<div>
<h2 id="dName"></h2>

<div class="qty">
<button onclick="minus()">-</button>
<span id="qty">1</span>
<button onclick="plus()">+</button>
</div>

<button class="btn" onclick="addToCart()">Add to Cart</button>
<button class="btn" onclick="orderNow()">Order Now</button>

</div>
</div>
</div>

</div>

<div class="right">
<h3>Top Brands</h3>
<p>Osaka</p>
<p>AGS</p>
<p>Phoenix</p>
<p>Exide</p>
<p>Volta</p>
<p>Unique</p>
</div>

</div>

<div class="whatsapp" onclick="orderNow()">💬</div>

<script>

let cart=[];
let currentProduct="";
let quantity=1;

let data={
osaka:["NS40","NS60","TA-1200"],
ags:["GR-65","SP-180"],
phoenix:["XP-50","XP-70"],
exide:["N55","N65"],
volta:["T-125","T-150"],
unique:["U-100","U-120"]
};

function showBrand(brand){
document.getElementById("brands").style.display="none";
document.getElementById("products").style.display="block";

let list=document.getElementById("productList");
list.innerHTML="";

data[brand].forEach(model=>{
list.innerHTML+=`
<div class="card" onclick="openDetail('${brand} ${model}')">
<img src="https://via.placeholder.com/150">
<h3>${brand.toUpperCase()} ${model}</h3>
</div>`;
});
}

function openDetail(name){
currentProduct=name;
quantity=1;
document.getElementById("products").style.display="none";
document.getElementById("detail").style.display="block";
document.getElementById("dName").innerText=name;
document.getElementById("qty").innerText=quantity;
}

function backToProducts(){
document.getElementById("detail").style.display="none";
document.getElementById("products").style.display="block";
}

function plus(){
quantity++;
document.getElementById("qty").innerText=quantity;
}

function minus(){
if(quantity>1) quantity--;
document.getElementById("qty").innerText=quantity;
}

function addToCart(){
cart.push(currentProduct+" x"+quantity);
alert("Added: "+currentProduct);
}

function orderNow(){
let msg=currentProduct+" x"+quantity;
window.open("https://wa.me/923014681059?text="+msg);
}

function goHome(){
document.getElementById("brands").style.display="grid";
document.getElementById("products").style.display="none";
document.getElementById("detail").style.display="none";
}

</script>

</body>
</html>
